# Conda environment for the full pipeline including R/MSGARCH.
# For Python-only (no R), use:  pip install -r requirements.txt
name: friday-etf
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.26,<2.0
  - pandas>=2.2,<3.0
  - scipy>=1.13,<2.0
  - statsmodels>=0.14,<1.0
  - scikit-learn>=1.4,<2.0
  - matplotlib>=3.8,<4.0
  - pypdf>=4.0,<5.0
  - pip
  # Optional: R + MSGARCH for the rigorous fit in script 06.
  # Comment these out if you only want the Python EM / proxy backends.
  - r-base=4.3.*
  - r-msgarch=2.5.*
  - rpy2>=3.5,<4.0
  - pip:
      - yfinance>=0.2.40,<0.3
